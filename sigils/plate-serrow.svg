<circle cx="450" cy="400" r="4.5" fill="var(--red)"/>
<circle cx="450" cy="400" r="9" class="nofill" stroke="var(--red)" stroke-width="0.8"/>
<g class="soft hair">
  <line x1="450" y1="400" x2="450" y2="250" class="dash"/>
  <line x1="450" y1="400" x2="556" y2="294" class="dash"/>
  <text x="462" y="268" class="num tfaint">r = 150 u</text>
  <text x="520" y="318" class="num tfaint">&#952; 45&#176;</text>
</g>
