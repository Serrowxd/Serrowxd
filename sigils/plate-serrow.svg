<svg viewBox="0 0 900 760" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d" font-family="'Courier New', ui-monospace, monospace">
<title id="t">SERROW — codex plate</title>
<desc id="d">An annotated technical-schematic plate: a sacred-geometry sigil dissected with dimension lines, runic callouts and hermetic equations, presenting Serrow and the work.</desc>
<style>
  :root{
    --paper:#e8e1d1; --ink:#1b1a16; --soft:#47443a; --faint:#b6ad99;
    --accent:#6e6140; --red:#7c3a2c; --grain:0.05;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --paper:#14161a; --ink:#cdbf9f; --soft:#8d856c; --faint:#363941;
      --accent:#c8b99a; --red:#b56a52; --grain:0.06;
    }
  }
  .bg{fill:var(--paper);}
  .ink{stroke:var(--ink);} .soft{stroke:var(--soft);} .faint{stroke:var(--faint);}
  .nofill{fill:none;}
  text{fill:var(--ink);}
  .tsoft{fill:var(--soft);} .tfaint{fill:var(--faint);} .tred{fill:var(--red);}
  .hair{stroke-width:0.7;} .thin{stroke-width:1;} .med{stroke-width:1.4;}
  .dash{stroke-dasharray:2 4;} .dash2{stroke-dasharray:1 6;} .dash3{stroke-dasharray:6 5;}
  .lbl{font-size:11px; letter-spacing:1.5px;}
  .micro{font-size:8.5px; letter-spacing:1px;}
  .anno{font-size:10px; font-style:italic; letter-spacing:.4px;}
  .num{font-size:9px; letter-spacing:.5px;}
</style>
<defs>
  <filter id="pencil" x="-6%" y="-6%" width="112%" height="112%">
    <feTurbulence type="fractalNoise" baseFrequency="0.013 0.02" numOctaves="2" seed="11" result="n"/>
    <feDisplacementMap in="SourceGraphic" in2="n" scale="3.1" xChannelSelector="R" yChannelSelector="G"/>
  </filter>
  <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/></filter>
  <marker id="ar" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6" class="nofill ink hair"/></marker>
</defs>
<rect class="bg" x="0" y="0" width="900" height="760"/>
<rect x="0" y="0" width="900" height="760" filter="url(#grain)" opacity="0.05"/>
<g class="ink hair nofill">
  <rect x="26" y="26" width="848" height="708"/>
  <rect x="32" y="32" width="836" height="696" class="faint dash2"/>
</g>
<g class="soft hair">
