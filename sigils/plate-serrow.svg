  <text x="566" y="464" class="anno tsoft">the point before the name</text>
</g>
<g>
  <line x1="660" y1="222" x2="760" y2="222" class="ink hair"/>
  <text x="760" y="213" text-anchor="end" class="lbl tsoft">THE WORK</text>
  <text x="760" y="235" text-anchor="end" class="micro tfaint">ii named</text>
  <text x="760" y="270" text-anchor="end" font-size="22" letter-spacing="3" font-weight="700">TWICE</text>
  <text x="760" y="286" text-anchor="end" class="anno tsoft">a home for plural systems</text>
  <text x="760" y="299" text-anchor="end" class="anno tsoft">fronting &#183; threads &#183; grounding</text>
  <path d="M672,278 C648,314 624,350 604,374" class="nofill soft hair dash" marker-end="url(#ar)"/>
  <text x="760" y="313" text-anchor="end" class="micro tfaint">github.com/Serrowxd/Twice</text>
  <text x="760" y="356" text-anchor="end" font-size="22" letter-spacing="3" font-weight="700">GLYPH</text>
  <text x="760" y="372" text-anchor="end" class="anno tsoft">registry for portable agent behavior</text>
  <text x="760" y="385" text-anchor="end" class="anno tsoft">npm for agents</text>
  <path d="M672,366 C648,382 624,396 604,406" class="nofill soft hair dash" marker-end="url(#ar)"/>
  <text x="760" y="399" text-anchor="end" class="micro tfaint">github.com/Serrowxd/Glyph</text>
</g>
<g class="tfaint" font-size="8.5px" font-style="italic">
  <text x="44" y="180">will leans hard</text>
  <text x="44" y="193">against the dark,</text>
  <text x="44" y="206">and the dark</text>
  <text x="44" y="219">leans back —</text>
  <text x="44" y="232">chance bends,</text>
  <text x="44" y="245">the odds tip,</text>
  <text x="44" y="258">something forced</text>
  <text x="44" y="271">into being.</text>
</g>
<g class="tsoft" font-size="11px">
  <text x="690" y="500">&#936; &#8801; &#8750; will · d(prob)</text>
  <text x="690" y="520" class="tfaint" font-size="9px">field of intent, closed path</text>
  <text x="690" y="548">&#966; = 1.6180339&#8230;</text>
  <text x="690" y="568" class="tfaint" font-size="9px">ratio latent in the form</text>
  <text x="690" y="596" class="tred">as above &#8756; so below</text>
</g>
<g>
  <line x1="120" y1="612" x2="600" y2="612" class="faint hair dash"/>
