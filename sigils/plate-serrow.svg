  <line x1="868" y1="734" x2="880" y2="734"/><line x1="874" y1="728" x2="874" y2="740"/>
</g>
<text x="44" y="58" class="micro tfaint">WITNESSED · XVIII · VI · MMXXVI</text>
<text x="856" y="58" class="micro tfaint" text-anchor="end">PLATE 019 — SERROWXD</text>
<text x="450" y="86" text-anchor="middle" font-size="46" letter-spacing="14" font-weight="700">SERROW</text>
<text x="450" y="108" text-anchor="middle" class="lbl tsoft">&#5815; &#160;·&#160; &#5839; &#160;·&#160; &#5817;</text>
