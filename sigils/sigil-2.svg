<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 200" fill="none">
  <!-- X arms -->
  <line x1="28" y1="18" x2="192" y2="182" stroke="#586069" stroke-width="1"/>
  <line x1="192" y1="18" x2="28" y2="182" stroke="#586069" stroke-width="1"/>

  <!-- center × dot -->
  <circle cx="110" cy="100" r="4" fill="#586069"/>

  <!-- ∴ — top-left (three-dot triangle) -->
  <circle cx="34"  cy="22"  r="2"   fill="#586069"/>
  <circle cx="26"  cy="34"  r="1.5" fill="#444d56"/>
  <circle cx="42"  cy="34"  r="1.5" fill="#444d56"/>

  <!-- ∴ — top-right -->
  <circle cx="186" cy="22"  r="2"   fill="#586069"/>
  <circle cx="178" cy="34"  r="1.5" fill="#444d56"/>
  <circle cx="194" cy="34"  r="1.5" fill="#444d56"/>

  <!-- ∴ — bottom-left (inverted) -->
  <circle cx="34"  cy="178" r="2"   fill="#586069"/>
  <circle cx="26"  cy="166" r="1.5" fill="#444d56"/>
  <circle cx="42"  cy="166" r="1.5" fill="#444d56"/>

  <!-- ∴ — bottom-right (inverted) -->
  <circle cx="186" cy="178" r="2"   fill="#586069"/>
  <circle cx="178" cy="166" r="1.5" fill="#444d56"/>
  <circle cx="194" cy="166" r="1.5" fill="#444d56"/>

  <!-- dot scatter along arms -->
  <circle cx="62"  cy="48"  r="1.2" fill="#3a424a"/>
  <circle cx="82"  cy="68"  r="1"   fill="#3a424a"/>
  <circle cx="158" cy="48"  r="1.2" fill="#3a424a"/>
  <circle cx="138" cy="68"  r="1"   fill="#3a424a"/>
  <circle cx="62"  cy="152" r="1.2" fill="#3a424a"/>
  <circle cx="82"  cy="132" r="1"   fill="#3a424a"/>
  <circle cx="158" cy="152" r="1.2" fill="#3a424a"/>
  <circle cx="138" cy="132" r="1"   fill="#3a424a"/>
</svg>
