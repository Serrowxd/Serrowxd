<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" fill="none">
  <!-- outer diamond -->
  <polygon points="80,14 146,80 80,146 14,80" stroke="#586069" stroke-width="1"/>

  <!-- ⊗ at each diamond point -->
  <!-- top -->
  <circle cx="80" cy="14" r="5"   stroke="#586069" stroke-width="0.75"/>
  <line x1="76.5" y1="10.5" x2="83.5" y2="17.5" stroke="#586069" stroke-width="0.75"/>
  <line x1="83.5" y1="10.5" x2="76.5" y2="17.5" stroke="#586069" stroke-width="0.75"/>

  <!-- bottom -->
  <circle cx="80" cy="146" r="5"  stroke="#586069" stroke-width="0.75"/>
  <line x1="76.5" y1="142.5" x2="83.5" y2="149.5" stroke="#586069" stroke-width="0.75"/>
  <line x1="83.5" y1="142.5" x2="76.5" y2="149.5" stroke="#586069" stroke-width="0.75"/>

  <!-- left -->
  <circle cx="14" cy="80" r="5"   stroke="#586069" stroke-width="0.75"/>
  <line x1="10.5" y1="76.5" x2="17.5" y2="83.5" stroke="#586069" stroke-width="0.75"/>
  <line x1="17.5" y1="76.5" x2="10.5" y2="83.5" stroke="#586069" stroke-width="0.75"/>

  <!-- right -->
  <circle cx="146" cy="80" r="5"  stroke="#586069" stroke-width="0.75"/>
  <line x1="142.5" y1="76.5" x2="149.5" y2="83.5" stroke="#586069" stroke-width="0.75"/>
  <line x1="149.5" y1="76.5" x2="142.5" y2="83.5" stroke="#586069" stroke-width="0.75"/>

  <!-- center ◈ (rotated square + dot) -->
  <rect x="71" y="71" width="18" height="18" stroke="#586069" stroke-width="1" transform="rotate(45 80 80)"/>
  <circle cx="80" cy="80" r="3" fill="#586069"/>

  <!-- mid-edge dots -->
  <circle cx="80"  cy="48"  r="1.5" fill="#444d56"/>
  <circle cx="80"  cy="112" r="1.5" fill="#444d56"/>
  <circle cx="48"  cy="80"  r="1.5" fill="#444d56"/>
  <circle cx="112" cy="80"  r="1.5" fill="#444d56"/>

  <!-- inner corner dots -->
  <circle cx="60"  cy="60"  r="1"   fill="#3a424a"/>
  <circle cx="100" cy="60"  r="1"   fill="#3a424a"/>
  <circle cx="60"  cy="100" r="1"   fill="#3a424a"/>
  <circle cx="100" cy="100" r="1"   fill="#3a424a"/>
</svg>
